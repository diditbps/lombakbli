<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Premium - KBLI 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --gold: #fcc201;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            margin-bottom: 30px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn-home:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .spotlight {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            align-items: end;
        }

        .podium-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .rank-1 {
            order: 2;
            padding: 50px 20px;
            transform: scale(1.1);
            z-index: 10;
            border-color: var(--gold);
            box-shadow: 0 0 40px rgba(252, 194, 1, 0.2);
        }

        .rank-2 {
            order: 1;
            padding: 35px 20px;
            border-color: var(--silver);
        }

        .rank-3 {
            order: 3;
            padding: 35px 20px;
            border-color: var(--bronze);
        }

        .podium-card .crown {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
        }

        .podium-card .score {
            font-size: 2rem;
            font-weight: 800;
            color: #818cf8;
            margin: 10px 0;
        }

        .podium-card .name {
            font-weight: 700;
            font-size: 1.15rem;
            display: block;
            margin-bottom: 5px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .podium-card .satker {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .podium-label {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .rank-1 .podium-label {
            background: var(--gold);
            color: #451a03;
        }

        .leaderboard-table-container {
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            text-align: left;
            color: #94a3b8;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .num {
            font-weight: 800;
            color: #64748b;
            width: 60px;
        }

        .score {
            font-weight: 800;
            color: #818cf8;
            text-align: right;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            align-items: center;
        }

        .pagination button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .pagination button:hover:not(:disabled) {
            background: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: #94a3b8;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .spotlight {
                grid-template-columns: 1fr;
                gap: 40px;
            }

            .rank-1 {
                order: 1;
                transform: scale(1);
            }

            .rank-2 {
                order: 2;
            }

            .rank-3 {
                order: 3;
            }

            h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <button class="btn-home" onclick="location.href='index.html'">
                <i data-lucide="home"></i> Kembali ke Beranda
            </button>
            <h1>Hall of Fame</h1>
            <p style="color: #94a3b8; margin-top: 10px;">Real-time Lomba KBLI 2025 • Update Setiap 10 Detik</p>
        </header>

        <div id="spotlight-container" class="spotlight"></div>

        <div class="leaderboard-table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nama Peserta</th>
                        <th>Satker</th>
                        <th style="text-align: right;">Skor</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button id="prevBtn" onclick="changePage(-1)">Sebelumnya</button>
            <span class="page-info" id="pageInfo">Halaman 1</span>
            <button id="nextBtn" onclick="changePage(1)">Berikutnya</button>
        </div>
    </div>

    <script>
        const spreadsheetId = '13ydt6jLy5NATJ3JwaZRyMCjJq77SKKaVEN2ZTiJy6U8';
        const sheetName = 'Rekap';
        const itemsPerPage = 20;
        let currentPage = 1;
        let allPlayers = [];

        async function fetchLeaderboard() {
            const query = encodeURIComponent('SELECT A, B, C, AT WHERE A IS NOT NULL ORDER BY AT DESC');
            const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}&tq=${query}`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonText = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonText);

                allPlayers = data.table.rows.map(r => ({
                    nama: r.c[0] ? r.c[0].v : '-',
                    email: r.c[1] ? r.c[1].v : '-',
                    satker: r.c[2] ? r.c[2].v : '-',
                    score: r.c[3] ? parseFloat(r.c[3].v) : 0
                }));

                if (isNaN(allPlayers[0].score)) allPlayers.shift();
                renderUI();
            } catch (e) { console.error("Error:", e); }
        }

        function renderUI() {
            const container = document.getElementById('spotlight-container');
            const top3 = allPlayers.slice(0, 3);
            container.innerHTML = '';
            const crownMap = { 1: '👑', 2: '🥈', 3: '🥉' };

            top3.forEach((p, i) => {
                const rank = i + 1;
                const div = document.createElement('div');
                div.className = `podium-card rank-${rank}`;
                div.innerHTML = `
                    <div class="podium-label">Juara ${rank}</div>
                    <span class="crown">${crownMap[rank]}</span>
                    <span class="name">${p.nama}</span>
                    <div class="score">${Math.round(p.score)}</div>
                    <span class="satker">${p.satker}</span>
                `;
                container.appendChild(div);
            });

            const body = document.getElementById('leaderboard-body');
            body.innerHTML = '';
            const tableData = allPlayers.slice(3);
            const totalPages = Math.ceil(tableData.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const currentItems = tableData.slice(start, start + itemsPerPage);

            currentItems.forEach((p, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="num">${start + i + 4}</td>
                    <td>
                        <div style="font-weight:700; color:white;">${p.nama}</div>
                        <div style="font-size:0.75rem; color:#64748b">${p.email}</div>
                    </td>
                    <td style="color:#94a3b8">${p.satker}</td>
                    <td class="score">${Math.round(p.score)}</td>
                `;
                body.appendChild(tr);
            });

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} dari ${totalPages || 1}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;
            lucide.createIcons();
        }

        function changePage(step) { currentPage += step; renderUI(); }
        fetchLeaderboard();
        setInterval(fetchLeaderboard, 10000); 
    </script>
</body>

</html>
